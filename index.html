<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDF 간편 편집기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#e8e8e8;overflow:hidden;height:100vh;height:100dvh}
.lo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;font-size:18px}
.lo.h{display:none}
.ls2{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top:4px solid #fff;border-radius:50%;animation:sp 1s linear infinite;margin-bottom:16px}
@keyframes sp{to{transform:rotate(360deg)}}
.eb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:40px;border-radius:12px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);z-index:9999;max-width:90vw}
.eb.h{display:none}
.eb h2{color:#e74c3c;margin-bottom:12px}
.eb p{color:#555;line-height:1.6;margin-bottom:16px}

.topbar{background:#1a1a2e;color:#fff;padding:4px 8px;display:flex;align-items:center;gap:6px;z-index:100;height:38px;flex-shrink:0}
.pnav{display:flex;align-items:center;gap:3px}
.pnav span{font-size:13px;color:#ddd}

.btn{padding:7px 12px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:filter .1s}
.btn:hover{filter:brightness(1.15)}
.btn-open{background:#0078d4;color:#fff}
.bt{background:rgba(255,255,255,.08);color:#ccc;padding:7px 10px;font-size:13px}
.bt:hover{background:rgba(255,255,255,.15);color:#fff}
.bt.active{background:#e74c3c;color:#fff}
.bt[data-tool="whiteout"].active{background:#fff;color:#333}
.bt[data-tool="capture"].active{background:#8e44ad;color:#fff}
.btn-d{background:#e74c3c;color:#fff}
.btn-s{background:#27ae60;color:#fff}
.btn-w{background:#f39c12;color:#fff}
.bf{width:100%;justify-content:center;margin-bottom:5px;padding:9px 12px;font-size:14px}
select{padding:5px 6px;border:none;border-radius:5px;font-size:13px;background:rgba(255,255,255,.12);color:#fff;font-family:inherit}
select option{color:#000;background:#fff}

/* 플로팅 패널 */
.fp{position:fixed;z-index:200;background:#1e1e2e;border-radius:12px;box-shadow:0 6px 30px rgba(0,0,0,.4);display:none;user-select:none}
.lp{top:50px;left:10px;width:200px}
.rp{top:50px;right:10px;width:180px}
.ph{background:#2a2a3e;padding:8px 10px;border-radius:12px 12px 0 0;cursor:move;font-size:13px;font-weight:700;color:#ddd;display:flex;justify-content:space-between;align-items:center}
.pc{cursor:pointer;font-size:16px;color:#888;padding:0 4px}.pc:hover{color:#e74c3c}
.pb{padding:8px}
.pd{height:1px;background:rgba(255,255,255,.1);margin:6px 0}
.pl{font-size:11px;color:#999;margin-bottom:4px;font-weight:600}
.pr{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.pr label{font-size:12px;color:#aaa;min-width:32px}
.pr select{flex:1;font-size:13px;padding:5px}

/* 도구 그리드 */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.tg .bt{font-size:13px;padding:8px 4px;justify-content:center;background:rgba(255,255,255,.06);color:#bbb;border-radius:6px}

/* 색상 */
.cp{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px}
.cd{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .1s;margin:0 auto}
.cd:hover{transform:scale(1.2)}
.cd.active{border-color:#fff;transform:scale(1.15)}
/* RGB 선택기 */
.rgb-row{display:flex;align-items:center;gap:4px;margin-top:4px}
.rgb-row input[type="color"]{width:36px;height:28px;border:2px solid rgba(255,255,255,.2);border-radius:6px;cursor:pointer;padding:1px;background:transparent}
.rgb-row span{font-size:10px;color:#888}

/* 도형패널 */
.sp{display:none;position:absolute;bottom:100%;left:0;background:#fff;border:1px solid #ccc;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.25);padding:8px;z-index:500;width:280px;max-height:340px;overflow-y:auto}
.sp.open{display:block}
.sc{font-size:11px;font-weight:700;color:#555;padding:3px 2px;border-bottom:1px solid #eee;margin-top:5px}
.sc:first-child{margin-top:0}
.sg{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:3px 0}
.si{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer}
.si:hover{background:#e8e8e8}
.si svg{width:22px;height:22px}

/* 드롭존 */
.dz{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 38px);height:calc(100dvh - 38px);width:100%;background:#f8f9fa}
.dzi{border:3px dashed #bdc3c7;border-radius:20px;padding:40px 60px;text-align:center;cursor:pointer;transition:all .3s;background:#fff;max-width:90vw}
.dzi:hover{border-color:#3498db;background:#ebf5fb}

/* PDF뷰어 */
.pv{overflow:auto;background:#555;display:none;padding:16px;height:calc(100vh - 38px);height:calc(100dvh - 38px)}
.pw{position:relative;margin:0 auto 16px;box-shadow:0 4px 20px rgba(0,0,0,.3);background:#fff;width:fit-content}
.pw canvas{display:block}
.al{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20}

/* 텍스트 - 리사이즈 핸들 포함 */
.tw{position:absolute;z-index:50}
.tw textarea{display:block;border:2px solid #3498db;background:rgba(255,255,255,.95);border-radius:3px;padding:3px 5px;font-weight:700;resize:none;font-family:'Malgun Gothic',sans-serif;line-height:1.3;outline:none;min-width:50px;min-height:22px;overflow:hidden;width:180px}
.tw.placed textarea{border:1px dashed transparent;background:transparent;cursor:move}
.tw.placed textarea:focus{border:2px solid #3498db;background:rgba(255,255,255,.95);cursor:text}
.tw.placed:hover textarea{border-color:#aaa}
.tw:hover .ad{opacity:1}
.tw:hover .rh{opacity:1}
.tw .rh{position:absolute;bottom:-4px;right:-4px;width:12px;height:12px;background:#3498db;border-radius:2px;cursor:nwse-resize;z-index:56;opacity:0;transition:opacity .15s}

.wc{position:absolute;background:#fff;z-index:10;cursor:move}
.wc:hover .ad{opacity:1}.wc:hover{outline:1px dashed #aaa}
.hb{position:absolute;opacity:.45;border-radius:2px;z-index:8;cursor:move}
.hb:hover .ad{opacity:1}
.sb{position:absolute;z-index:12;cursor:move}
.sb:hover .ad{opacity:1}
.sb:hover .rh{opacity:1}
.sb .rh{position:absolute;bottom:-4px;right:-4px;width:12px;height:12px;background:#3498db;border-radius:2px;cursor:nwse-resize;z-index:56;opacity:0;transition:opacity .15s}

.ls3,.ds{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15}
.ds.active{pointer-events:all;cursor:crosshair}
.ls3 line{pointer-events:stroke;cursor:pointer}
.ds path{pointer-events:stroke;cursor:pointer}

.ad{position:absolute;top:-10px;right:-10px;width:22px;height:22px;background:#e74c3c;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;line-height:22px;text-align:center;opacity:0;transition:opacity .15s;z-index:55}
.sel{outline:2px solid #3498db !important;outline-offset:2px}
.ps{position:absolute;z-index:14;cursor:move}
.ps:hover .ad{opacity:1}
.ps svg{pointer-events:none}
.ps .rh{position:absolute;bottom:-4px;right:-4px;width:12px;height:12px;background:#3498db;border-radius:2px;cursor:nwse-resize;z-index:56;opacity:0;transition:opacity .15s}
.ps:hover .rh{opacity:1}

.cs{position:absolute;border:2px dashed #8e44ad;background:rgba(142,68,173,.08);z-index:60;pointer-events:none}
.cb{position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);display:flex;gap:5px;pointer-events:all;background:rgba(0,0,0,.85);padding:5px 10px;border-radius:8px;white-space:nowrap}
.cb button{padding:6px 14px;border:none;border-radius:5px;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit}

.ti{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 16px;background:rgba(0,0,0,.8);color:#fff;border-radius:8px;font-size:14px;z-index:200;display:none;font-weight:600}

/* 반응형 */
@media(max-width:768px){
  .lp{width:170px;top:42px;left:4px}
  .rp{width:150px;top:42px;right:4px}
  .tg .bt{font-size:11px;padding:6px 3px}
  .bf{font-size:12px;padding:7px 8px}
  .cd{width:22px;height:22px}
  .pv{padding:8px}
  .dzi{padding:30px 20px}
}
@media(max-width:480px){
  .topbar{height:34px;padding:2px 6px;gap:4px}
  .btn{padding:5px 8px;font-size:11px}
  .lp{width:150px}
  .rp{width:140px}
  .tg{grid-template-columns:1fr 1fr}
  .tg .bt{font-size:10px;padding:5px 2px}
}
@media(min-width:1400px){
  .lp{width:220px}
  .rp{width:200px}
  .tg .bt{font-size:14px;padding:10px 6px}
  .bf{font-size:15px;padding:11px 14px}
  .cd{width:30px;height:30px}
}

@media print{
  .topbar,.dz,.ti,.fp{display:none !important}
  .pv{display:block !important;overflow:visible !important;padding:0 !important;background:#fff !important;height:auto !important}
  .pw{box-shadow:none !important;margin:0 !important;page-break-after:always}
  .ad,.cs,.rh,.sel{display:none !important;outline:none !important}
  .tw.placed textarea{border:none !important;background:transparent !important}
  .wc{outline:none !important}
}
</style>
</head>
<body>

<div class="lo h" id="lo"><div class="ls2"></div><div>PDF 로딩 중...</div></div>
<div class="eb h" id="eb"><h2>⚠️ 인터넷 필요</h2><p>PDF.js를 불러올 수 없습니다.</p><button class="btn btn-open" onclick="location.reload()">다시 시도</button></div>

<div class="topbar">
  <button class="btn btn-open" onclick="document.getElementById('fi').click()">📂 열기</button>
  <input type="file" id="fi" accept=".pdf" style="display:none">
  <div class="pnav" id="pn" style="display:none">
    <button class="btn bt" id="bp">◀</button>
    <span><span id="cp2">1</span>/<span id="tp2">1</span></span>
    <button class="btn bt" id="bn">▶</button>
    <select id="zl"><option value="0.75">75%</option><option value="1" selected>100%</option><option value="1.25">125%</option><option value="1.5">150%</option><option value="2">200%</option></select>
  </div>
  <div style="flex:1"></div>
  <button class="btn bt" id="tl" style="display:none">🔧 도구</button>
  <button class="btn bt" id="tr" style="display:none">💾 출력</button>
</div>

<!-- 왼쪽 패널 -->
<div class="fp lp" id="lp">
  <div class="ph" id="lph">🔧 도구 <span class="pc" id="lc">✕</span></div>
  <div class="pb">
    <div class="tg">
      <button class="btn bt" data-tool="select">👆 선택</button>
      <button class="btn bt" data-tool="text">✏️ 글쓰기</button>
      <button class="btn bt" data-tool="whiteout">⬜ 화이트</button>
      <button class="btn bt" data-tool="highlight">🖍️ 형광펜</button>
      <button class="btn bt" data-tool="line">📏 줄</button>
      <button class="btn bt" data-tool="draw">🖊️ 펜</button>
      <button class="btn bt" data-tool="rect">▭ 네모</button>
      <button class="btn bt" data-tool="circle">⭕ 원</button>
      <button class="btn bt" data-tool="capture">📷 캡처</button>
      <div style="position:relative"><button class="btn bt" id="bsh" style="width:100%">🔷 도형▾</button><div class="sp" id="shp"></div></div>
    </div>
    <div class="pd"></div>
    <div class="pl">색상</div>
    <div class="cp" id="pal"></div>
    <div class="rgb-row"><input type="color" id="rgbPick" value="#FF0000"><span>RGB 직접선택</span></div>
    <div class="pd"></div>
    <div class="pr"><label>크기</label><select id="fs"><option value="12">12</option><option value="14">14</option><option value="16" selected>16</option><option value="18">18</option><option value="20">20</option><option value="24">24</option><option value="28">28</option><option value="32">32</option><option value="36">36</option><option value="48">48</option></select></div>
    <div class="pr"><label>굵기</label><select id="lw"><option value="1">얇게</option><option value="2" selected>보통</option><option value="3">굵게</option><option value="5">아주굵게</option></select></div>
  </div>
</div>

<!-- 오른쪽 패널 -->
<div class="fp rp" id="rp">
  <div class="ph" id="rph">💾 출력 <span class="pc" id="rc">✕</span></div>
  <div class="pb">
    <button class="btn btn-d bf" id="bu">↩️ 되돌리기</button>
    <button class="btn btn-w bf" id="bc">🗑️ 전체삭제</button>
    <div class="pd"></div>
    <button class="btn btn-s bf" id="bpr">🖨️ 인쇄</button>
  </div>
</div>

<div class="dz" id="dz">
  <div class="dzi" id="dzi" onclick="document.getElementById('fi').click()">
    <div style="font-size:64px;margin-bottom:16px">📄</div>
    <div style="font-size:20px;font-weight:700;color:#2c3e50;margin-bottom:8px">PDF 파일을 여기에 끌어다 놓으세요</div>
    <div style="font-size:14px;color:#7f8c8d">또는 클릭하여 파일 선택</div>
  </div>
</div>
<div class="pv" id="pv"></div>
<div class="ti" id="ti"></div>

<script>
(function(){
  var lo=document.getElementById('lo'),eb=document.getElementById('eb');
  lo.classList.remove('h');
  var s=document.createElement('script');
  s.src='./pdf.min.js';
  s.onload=function(){pdfjsLib.GlobalWorkerOptions.workerSrc='./pdf.worker.min.js';lo.classList.add('h');initApp()};
  s.onerror=function(){lo.classList.add('h');eb.classList.remove('h')};
  document.head.appendChild(s);
})();

function initApp(){
  var pdfDoc=null,currentTool='text',currentScale=1,undoStack=[];
  var isDrawing=false,drawStartX=0,drawStartY=0,currentDrawPath=[],tempEl=null;
  var viewer=document.getElementById('pv'),fileInput=document.getElementById('fi'),indicator=document.getElementById('ti');

  // ★ 수정1: Ctrl+Z → 되돌리기 (브라우저 뒤로가기 방지)
  window.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo()}
  });
  // 브라우저 뒤로가기 방지
  history.pushState(null,null,location.href);
  window.addEventListener('popstate',function(){history.pushState(null,null,location.href)});

  // 패널
  var lp=document.getElementById('lp'),rp=document.getElementById('rp');
  document.getElementById('tl').addEventListener('click',function(){lp.style.display=lp.style.display==='none'?'block':'none'});
  document.getElementById('tr').addEventListener('click',function(){rp.style.display=rp.style.display==='none'?'block':'none'});
  document.getElementById('lc').addEventListener('click',function(){lp.style.display='none'});
  document.getElementById('rc').addEventListener('click',function(){rp.style.display='none'});

  function makePanelDrag(p,h){var d=false,ox,oy;h.addEventListener('mousedown',function(e){if(e.target.classList.contains('pc'))return;d=true;ox=e.clientX-p.offsetLeft;oy=e.clientY-p.offsetTop;e.preventDefault()});document.addEventListener('mousemove',function(e){if(!d)return;p.style.left=(e.clientX-ox)+'px';p.style.top=(e.clientY-oy)+'px';p.style.right='auto'});document.addEventListener('mouseup',function(){d=false});
    // 터치
    h.addEventListener('touchstart',function(e){if(e.target.classList.contains('pc'))return;d=true;var t=e.touches[0];ox=t.clientX-p.offsetLeft;oy=t.clientY-p.offsetTop},{passive:true});document.addEventListener('touchmove',function(e){if(!d)return;var t=e.touches[0];p.style.left=(t.clientX-ox)+'px';p.style.top=(t.clientY-oy)+'px';p.style.right='auto'},{passive:true});document.addEventListener('touchend',function(){d=false})}
  makePanelDrag(lp,document.getElementById('lph'));
  makePanelDrag(rp,document.getElementById('rph'));

  // 색상
  var COLORS=[
    {h:'#000000',n:'검정'},{h:'#FF0000',n:'빨강'},{h:'#FF6600',n:'주황'},
    {h:'#FFFF00',n:'형광노랑'},{h:'#00FF00',n:'형광초록'},
    {h:'#00FFFF',n:'형광하늘'},{h:'#3498db',n:'파랑'},{h:'#FF00FF',n:'형광핑크'},
    {h:'#ffffff',n:'흰색'},{h:'#7f8c8d',n:'회색'}
  ];
  var currentColor='#000000',selectedEl=null;
  var palEl=document.getElementById('pal');

  COLORS.forEach(function(c){
    var d=document.createElement('div');d.className='cd';d.style.background=c.h;
    if(c.h==='#ffffff')d.style.border='2px solid #aaa';
    d.title=c.n;d.setAttribute('data-color',c.h);
    d.addEventListener('click',function(){currentColor=c.h;updPal();if(selectedEl)applyColor(selectedEl,c.h);applyToActiveTA(c.h)});
    palEl.appendChild(d);
  });

  // ★ 수정6: RGB 직접선택
  document.getElementById('rgbPick').addEventListener('input',function(){
    currentColor=this.value;updPal();
    if(selectedEl)applyColor(selectedEl,currentColor);applyToActiveTA(currentColor);
  });

  function updPal(){
    var ds=palEl.querySelectorAll('.cd');
    for(var i=0;i<ds.length;i++)ds[i].classList.toggle('active',ds[i].getAttribute('data-color')===currentColor);
    document.getElementById('rgbPick').value=currentColor;
  }

  function selEl(el){deselEl();selectedEl=el;el.classList.add('sel')}
  function deselEl(){if(selectedEl)selectedEl.classList.remove('sel');selectedEl=null}

  function applyColor(el,color){
    if(el.classList.contains('tw')){var ta=el.querySelector('textarea');if(ta)ta.style.color=color}
    else if(el.classList.contains('hb'))el.style.background=color;
    else if(el.classList.contains('sb'))el.style.borderColor=color;
    else if(el.classList.contains('ps')){var sv=el.querySelector('svg');if(sv){sv.setAttribute('stroke',color);if(sv.getAttribute('fill')!=='none')sv.setAttribute('fill',color)}}
  }

  // 현재 작성 중인 textarea 색상 즉시 변경
  function applyToActiveTA(color){
    var active=document.activeElement;
    if(active&&active.tagName==='TEXTAREA'){
      var wrap=active.closest('.tw');
      if(wrap&&!wrap.classList.contains('placed')){active.style.color=color}
    }
  }

  document.addEventListener('mousedown',function(e){
    if(currentTool==='select'&&selectedEl){
      if(e.target.closest('.fp')||e.target.closest('.cp')||e.target.closest('.rgb-row'))return;
      if(selectedEl.contains(e.target))return;
      var s=e.target.closest('.tw,.hb,.sb,.ps,.wc');
      if(!s)deselEl();
    }
  });

  // 파일 열기
  fileInput.addEventListener('change',function(e){
    var file=e.target.files[0];if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){
      pdfjsLib.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
        pdfDoc=pdf;
        document.getElementById('dz').style.display='none';
        viewer.style.display='block';
        document.getElementById('tp2').textContent=pdf.numPages;
        document.getElementById('pn').style.display='flex';
        document.getElementById('tl').style.display='inline-flex';
        document.getElementById('tr').style.display='inline-flex';
        lp.style.display='block';rp.style.display='block';
        renderAllPages();setTool('text');
      }).catch(function(err){alert('PDF 열기 실패: '+err.message)});
    };
    r.readAsArrayBuffer(file);
  });

  function renderAllPages(){
    viewer.innerHTML='';
    for(var n=1;n<=pdfDoc.numPages;n++){
      (function(pn){
        pdfDoc.getPage(pn).then(function(page){
          var vp=page.getViewport({scale:currentScale*1.5});
          var w=document.createElement('div');w.className='pw';w.setAttribute('data-page',pn);
          w.style.width=vp.width+'px';w.style.height=vp.height+'px';
          var cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
          page.render({canvasContext:cv.getContext('2d'),viewport:vp});
          var ls=document.createElementNS('http://www.w3.org/2000/svg','svg');ls.setAttribute('class','ls3');
          var ds=document.createElementNS('http://www.w3.org/2000/svg','svg');ds.setAttribute('class','ds');
          var al=document.createElement('div');al.className='al';al.setAttribute('data-page',pn);
          w.appendChild(cv);w.appendChild(ls);w.appendChild(ds);w.appendChild(al);viewer.appendChild(w);
          al.addEventListener('mousedown',function(e){onMD(e,pn)});
          al.addEventListener('mousemove',function(e){onMM(e,pn)});
          al.addEventListener('mouseup',function(e){onMU(e,pn)});
          ds.addEventListener('mousedown',function(e){onDD(e,pn)});
          ds.addEventListener('mousemove',function(e){onDM(e,pn)});
          ds.addEventListener('mouseup',function(e){onDU(e,pn)});
          // 터치 지원
